version: 2

project_name: onclaw

# GoReleaser injects {{.Version}} / {{.ShortCommit}} / {{.Date}} into the same
# version package the Makefile targets, so `onclaw version` is consistent whether
# built by make or by a release pipeline.
before:
  hooks:
    - go mod tidy

builds:
  - id: onclaw
    main: .
    binary: onclaw
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin # for local dev; low-resource targets are linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm # darwin/armv7 is not a real target
    ldflags:
      - -s -w
      - -X github.com/oniharnantyo/onclaw/internal/version.Version={{.Version}}
      - -X github.com/oniharnantyo/onclaw/internal/version.Commit={{.ShortCommit}}
      - -X github.com/oniharnantyo/onclaw/internal/version.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

# Boilerplate default: snapshot / local builds only. Remove this block when
# wiring up publishing to a real release target (GitHub Releases, etc.).
release:
  disable: true
